spring.application.name=Mazadat

# Database Configuration
spring.datasource.url=jdbc:mysql://mysql:3306/mazadat
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:mazadat_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:mazadat_password}

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.show-sql=false
spring.jpa.generate-ddl=true
spring.jpa.hibernate.ddl-auto=update

# Error Handling
server.error.include-message=always
server.error.include-stacktrace=always

# Upload Directory
mazadat.upload-dir=${MAZADAT_UPLOAD_DIR:/app/uploads}

# Server Configuration
server.port=${SERVER_PORT:8080}
server.servlet.context-path=/

# CORS Configuration
spring.web.cors.allowed-origins=*
spring.web.cors.allowed-methods=*
spring.web.cors.allowed-headers=*
spring.web.cors.max-age=3600

# Logging
logging.level.root=INFO
logging.level.org.springframework=INFO
logging.level.org.example.mazadat=DEBUG

