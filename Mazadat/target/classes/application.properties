spring.application.name=Mazadat

spring.datasource.url=jdbc:mysql://localhost:3306/mazadat
spring.datasource.username=root
spring.datasource.password=


spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

spring.jpa.show-sql=true

spring.jpa.generate-ddl=true

spring.jpa.hibernate.ddl-auto= update

server.error.include-message=always

server.error.include-stacktrace=always

mazadat.upload-dir=src/main/resources/images

# Server configuration for localhost
server.port=8080
server.servlet.context-path=/

# Fraud detection rules
mazadat.fraud.multi-account-threshold=3
mazadat.fraud.new-account-window-hours=24
mazadat.fraud.high-value-bid-threshold=50000

